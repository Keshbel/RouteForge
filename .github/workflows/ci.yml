name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: 6000.3.11f1
  PROJECT_PATH: .
  BUILD_SCENE: Assets/Scenes/MainScene.unity

jobs:
  conventional-commits:
    name: Conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Validate current commit subjects
        shell: bash
        run: |
          set -euo pipefail
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)\([a-z0-9._-]+\): [a-z0-9].{0,99}$'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            range="origin/${{ github.base_ref }}..${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          else
            range="${{ github.sha }}^..${{ github.sha }}"
          fi

          git log --format='%s' "$range" > /tmp/commit-subjects.txt
          while IFS= read -r subject; do
            if [[ "$subject" == Merge\ * ]]; then
              continue
            fi

            if (( ${#subject} > 100 )); then
              echo "::error::Commit subject exceeds 100 characters: $subject"
              exit 1
            fi

            if ! [[ "$subject" =~ $pattern ]]; then
              echo "::error::Invalid Conventional Commit subject: $subject"
              exit 1
            fi
          done < /tmp/commit-subjects.txt

  unity-tests:
    name: Unity ${{ matrix.testMode }} tests
    runs-on: ubuntu-latest
    needs: conventional-commits
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ matrix.testMode }}-
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: artifacts/${{ matrix.testMode }}
          coverageOptions: generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+RouteForge.Core,+RouteForge.Application,+RouteForge.Infrastructure,+RouteForge.Presentation

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.testMode }}-test-results
          path: artifacts/${{ matrix.testMode }}
          if-no-files-found: warn

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.testMode }}-coverage
          path: CodeCoverage
          if-no-files-found: warn

  smoke-build:
    name: Smoke build
    runs-on: ubuntu-latest
    needs: unity-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-smoke-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-

      - name: Build StandaloneWindows64 smoke player
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneWindows64
          buildsPath: build/smoke
          buildName: RouteForge-Smoke
          customParameters: -quit

      - name: Upload smoke build
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-build-StandaloneWindows64
          path: build/smoke
          if-no-files-found: warn
