name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UNITY_VERSION: 6000.3.11f1
  PROJECT_PATH: .

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Validate semantic tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi

          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  release-tests:
    name: Release ${{ matrix.testMode }} tests
    runs-on: ubuntu-latest
    needs: validate-tag
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-release-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-release-${{ matrix.testMode }}-
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: artifacts/${{ matrix.testMode }}
          coverageOptions: generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+RouteForge.Core,+RouteForge.Application,+RouteForge.Infrastructure,+RouteForge.Presentation

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.testMode }}-test-results
          path: artifacts/${{ matrix.testMode }}
          if-no-files-found: warn

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.testMode }}-coverage
          path: CodeCoverage
          if-no-files-found: warn

  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    needs: release-tests
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneLinux64
          - WebGL
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-release-build-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-release-build-${{ matrix.targetPlatform }}-
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-

      - name: Build player
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ matrix.targetPlatform }}
          buildsPath: build/${{ matrix.targetPlatform }}
          buildName: RouteForge-${{ matrix.targetPlatform }}

      - name: Package build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cd build/${{ matrix.targetPlatform }}
          zip -r "../../dist/RouteForge-${GITHUB_REF_NAME}-${{ matrix.targetPlatform }}.zip" .

      - name: Upload packaged build
        uses: actions/upload-artifact@v7
        with:
          name: RouteForge-${{ matrix.targetPlatform }}
          path: dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          pattern: RouteForge-*
          path: release-dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          sha256sum *.zip > SHA256SUMS.txt

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.validate-tag.outputs.prerelease }}
        run: |
          set -euo pipefail
          args=(
            release create "$GITHUB_REF_NAME"
            --title "RouteForge ${GITHUB_REF_NAME}"
            --generate-notes
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}" release-dist/*.zip release-dist/SHA256SUMS.txt
